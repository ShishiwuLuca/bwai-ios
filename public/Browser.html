<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Unsupported Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --primary-color: #2d8cf0;
      --bg-color: #f4f6f9;
      --text-color: #333;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .main {
      width: 100%;
      height: 100%;
      position: fixed;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      padding-left: 1rem;
      padding-right: 1rem;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .card svg {
      width: 80px;
      height: 80px;
    }

    h1 {
      font-size: 1.5rem;
      margin-top: 0;
    }

    p {
      font-size: 1rem;
      line-height: 1;
      color: #666;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background-color: var(--primary-color);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background-color: #1c6cd7;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .browser {
      padding: 2rem;
    }

    .browser > div {
      line-height: 1.5;
    }

    .BrowserName, .BrowserVersion, .BrowserUA {
      color: #ff4d4f;
    }
  </style>
</head>
<body>
  <div class="main">
    <div>
      <div class="card">
        <svg viewBox="0 0 24 24" fill="none">
          <path fill="#FF4D4F" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
          10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <h1>Your browser is not supported</h1>
        <p>Sorry, your browser version is too old to load this page.</p>
        <p>Please upgrade to the latest Chrome, Safari, Edge, or Firefox for a better experience.</p>
        <a class="btn" href="https://www.google.com/chrome/" target="_blank">Upgrade Now</a>
      </div>
      <div class="browser">
        <div>Browser Name: <span class="BrowserName"></span></div>
        <div>Browser Version: <span class="BrowserVersion"></span></div>
        <div>Browser UA: <span class="BrowserUA"></span></div>
      </div>
    </div>
  </div>
  <script>
    // 获取浏览器信息
    function getBrowserInfo() {
      const ua = navigator.userAgent;
      let tem, matched;

      matched = ua.match(
        /(edg|edge|opr|opera|chrome|crios|crmo|safari|firefox|fxios|msie|trident(?=\/))\/?\s*(\d+)/i
      ) || [];

      if (/trident/i.test(matched[1])) {
        tem = /\brv[ :]+(\d+)/g.exec(ua) || [];
        return { name: 'Internet Explorer', version: tem[1] || '' };
      }

      if (matched[1] === 'Chrome') {
        tem = ua.match(/\b(OPR|Edg|Edge)\/(\d+)/);
        if (tem != null) {
          const nameMap = { OPR: 'Opera', Edg: 'Edge', Edge: 'Edge' };
          return { name: nameMap[tem[1]] || tem[1], version: tem[2] };
        }
      }

      matched = matched[2]
        ? [matched[1], matched[2]]
        : [navigator.appName, navigator.appVersion, '-?'];

      tem = ua.match(/version\/(\d+)/i);
      if (tem != null) matched.splice(1, 1, tem[1]);

      // 设置浏览器名称
      document.querySelector('.BrowserName').textContent = matched[0];

      // 设置浏览器版本
      document.querySelector('.BrowserVersion').textContent = matched[1];

      // 设置浏览器UA
      document.querySelector('.BrowserUA').textContent = navigator.userAgent;
    }

    getBrowserInfo()
  </script>
</body>
</html>
